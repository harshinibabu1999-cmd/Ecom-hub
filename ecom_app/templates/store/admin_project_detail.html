{% extends 'store/admin_base.html' %}

{% block content %}


<style>

.page-container{
    max-width:900px;
    margin:40px auto;
}

.project-card{
    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.project-title{
    font-size:28px;
    font-weight:600;
    margin-bottom:20px;
}

.project-img{
    width:100%;
    max-width:350px;
    border-radius:10px;
    margin-bottom:20px;
}

.project-info{
    font-size:16px;
    margin-bottom:10px;
}

.project-desc{
    margin-top:15px;
    line-height:1.6;
    color:#444;
}

.btn-group{
    margin-top:25px;
}

.edit-btn{
    background:#007bff;
    color:white;
    padding:10px 18px;
    border-radius:6px;
    text-decoration:none;
    margin-right:10px;
    transition:0.3s;
}

.edit-btn:hover{
    background:#0056b3;
}

.delete-btn{
    background:#dc3545;
    color:white;
    padding:10px 18px;
    border-radius:6px;
    text-decoration:none;
    transition:0.3s;
}

.delete-btn:hover{
    background:#a71d2a;
}

</style>



<h2>{{ project.title }}</h2>
{% if project.project_image %}
<img src="{{ project.project_image.url }}" width="300">
{% endif %}
<p><b>Category:</b> {{ project.category }}</p>
<p><b>Price:</b> ₹{{ project.price }}</p>
<p><b>Description:</b></p>
<p>{{ project.description }}</p>
<a href="{% url 'admin_edit_project' project.id %}" class="edit-btn">Edit</a>
<a href="{% url 'admin_delete_project' project.id %}"
   class="delete-btn">
   Delete
   </a> 
{% endblock %}
