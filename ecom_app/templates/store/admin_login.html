{% extends 'store/admin_base.html' %}
{% block content %}

<style>
.login-container {
    width: 400px;
    margin: 80px auto;
    padding: 40px;
    background: #ffffff;
    border-radius: 15px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);
}

.login-container h2 {
    text-align: center;
    margin-bottom: 30px;
    color: #3f51b5;
    font-weight: 600;
}

.login-container label {
    display: block;
    margin-top: 15px;
    font-weight: 500;
    color: #333;
}

.login-container input {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 8px;
    border: 1px solid #ddd;
    outline: none;
    transition: 0.3s;
}

.login-container input:focus {
    border-color: #3f51b5;
    box-shadow: 0 0 5px rgba(63,81,181,0.2);
}

.login-container button {
    width: 100%;
    margin-top: 25px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #3f51b5;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.login-container button:hover {
    background: #2c3a9c;
}

.error-message {
    color: red;
    text-align: center;
    margin-bottom: 15px;
}

.register-link {
    text-align: center;
    margin-top: 18px;
}

.register-link a {
    color: #3f51b5;
    text-decoration: none;
    font-weight: 500;
}

.register-link a:hover {
    text-decoration: underline;
}
</style>

<div class="login-container">
    <h2>Login</h2>

    {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label>Username</label>
        <input type="username" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Login</button>
    </form>

    <div class="register-link">
        Don’t have an account?
        <a href="{% url 'register_view' %}">Register</a>
    </div>
</div>

{% endblock %}
