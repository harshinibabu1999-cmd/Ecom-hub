{% extends 'store/admin_base.html' %}

{% block content %}

<div class="center-wrapper">

    <div class="project-card">

        <h2>{{ project.title }}</h2>

        {% if project.project_image %}
        <img src="{{ project.project_image.url }}" class="project-img">
        {% endif %}

        <p><b>Category:</b> {{ project.category }}</p>
        <p><b>Price:</b> ₹{{ project.price }}</p>

        <p><b>Description:</b></p>
        <p>{{ project.description }}</p>

        <div class="btns">


            <a href="{% url 'admin_edit_project' project.id %}" class="edit-btn">Edit</a>

            <a href="{% url 'admin_delete_project' project.id %}"

               class="delete-btn"
               onclick="return confirm('Are you sure you want to delete this project?')">
               Delete
            </a>
        </div>

    </div>

</div>

<style>

.center-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.project-card{
    background:white;
    width:420px;
    padding:25px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.15);
    text-align: center;
}

.project-img{
    width:100%;
    max-width:320px;
    border-radius:6px;
    margin:15px 0;
}

.btns{
    margin-top:20px;
}

.edit-btn{
    background:#28a745;
    color:white;
    padding:8px 16px;
    text-decoration:none;
    border-radius:5px;
    margin-right:10px;
}

.delete-btn{
    background:#dc3545;
    color:white;
    padding:8px 16px;
    text-decoration:none;
    border-radius:5px;
}

.edit-btn:hover{
    background:#218838;
}

.delete-btn:hover{
    background:#c82333;
}

</style>

{% endblock %}
