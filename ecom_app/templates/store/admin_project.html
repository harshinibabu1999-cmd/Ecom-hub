{% extends 'store/admin_base.html' %}

{% block content %}

<style>

/* BACKGROUND */
body{
    background:linear-gradient(135deg,#eef2ff,#f8fafc);
    font-family:'Segoe UI',sans-serif;
}

/* CENTER WRAPPER */
.center-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

/* CARD */
.project-card{
    background:white;
    width:500px;
    padding:30px;
    border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    text-align:center;
    transition:0.3s;
}

.project-card:hover{
    transform:translateY(-5px);
}

/* TITLE */
.project-card h2{
    margin-bottom:15px;
    color:#0f172a;
}

/* IMAGE */
.project-img{
    width:100%;
    max-width:350px;
    border-radius:10px;
    margin:20px 0;
    box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

/* TEXT */
.project-info{
    margin:10px 0;
    font-size:15px;
    color:#374151;
}

.project-info b{
    color:#111827;
}

/* DESCRIPTION */
.project-desc{
    margin-top:15px;
    line-height:1.6;
    color:#4b5563;
}

/* BUTTONS */
.btns{
    margin-top:25px;
    display:flex;
    justify-content:center;
    gap:10px;
}

/* BUTTON BASE */
.btn{
    padding:10px 18px;
    border-radius:8px;
    text-decoration:none;
    color:white;
    font-size:14px;
    transition:0.3s;
}

/* EDIT */
.edit-btn{
    background:linear-gradient(135deg,#2563eb,#3b82f6);
}

.edit-btn:hover{
    box-shadow:0 5px 15px rgba(37,99,235,0.4);
}

/* DELETE */
.delete-btn{
    background:linear-gradient(135deg,#ef4444,#dc2626);
}

.delete-btn:hover{
    box-shadow:0 5px 15px rgba(239,68,68,0.4);
}

</style>


<div class="center-wrapper">

<div class="project-card">

<h2>{{ project.title }}</h2>

{% if project.project_image %}
<img src="{{ project.project_image.url }}" class="project-img">
{% endif %}

<p class="project-info"><b>📂 Category:</b> {{ project.category }}</p>
<p class="project-info"><b>💰 Price:</b> ₹{{ project.price }}</p>

<p class="project-info"><b>📝 Description:</b></p>
<p class="project-desc">{{ project.description }}</p>

<div class="btns">

<a href="{% url 'admin_edit_project' project.id %}" class="btn edit-btn">
✏ Edit
</a>

<a href="{% url 'admin_delete_project' project.id %}" 
   class="btn delete-btn"
   onclick="return confirm('Are you sure you want to delete this project?')">
🗑 Delete
</a>

</div>

</div>

</div>

{% endblock %}
