{% extends 'store/admin_base.html' %}
{% block content %}

<style>
    .dashboard-title {
        font-size: 28px;
        margin-bottom: 20px;
    }

    .analytics-cards {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-top: 20px;
    }

    .card {
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        text-align: center;
    }

    .card h3 {
        font-size: 18px;
        color: #555;
        margin-bottom: 10px;
    }

    .card p {
        font-size: 28px;
        font-weight: bold;
        color: #007bff;
    }
</style>
<div class="project-container">

    <h2 style="font-size:28px; color:#2f5fd0; text-align:center; margin-bottom:20px; font-weight:bold;">
       Admin Dashboard
    </h2>



<div class="analytics-cards">

    <div class="card">
        <h3>Total Students</h3>
        <p>{{ total_students }}</p>
    </div>

    <div class="card">
        <h3>Total Projects</h3>
        <p>{{ total_projects }}</p>
    </div>

    <div class="card">
        <h3>Total Sales</h3>
        <p>{{ total_sales }}</p>
    </div>

    <div class="card">
        <h3>Monthly Revenue</h3>
        <p>₹{{ monthly_revenue }}</p>
    </div>

</div>

</div>













































{% endblock %}
