{% extends "store/admin_base.html" %}
{% block content %}

<style>

/* PAGE TITLE */
.page-title{
    font-size:26px;
    font-weight:600;
    margin-bottom:25px;
    color:#0f172a;
}

/* CARD */
.form-card{
    background:white;
    padding:30px;
    border-radius:14px;
    box-shadow:0 6px 20px rgba(0,0,0,0.08);
    max-width:900px;
}

/* GRID */
.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

/* GROUP */
.form-group{
    display:flex;
    flex-direction:column;
}

/* LABEL */
.form-group label{
    font-weight:500;
    margin-bottom:6px;
    color:#444;
}

/* INPUT */
.form-group input,
.form-group textarea{
    padding:11px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
    transition:0.2s;
}

/* FOCUS EFFECT */
.form-group input:focus,
.form-group textarea:focus{
    border-color:#2563eb;
    outline:none;
    box-shadow:0 0 0 2px rgba(37,99,235,0.1);
}

/* TEXTAREA */
.form-group textarea{
    resize:none;
    height:110px;
}

/* FULL WIDTH */
.full-width{
    grid-column:1 / span 2;
}

/* IMAGE PREVIEW */
.preview{
    margin-top:10px;
}

.preview img{
    width:120px;
    border-radius:8px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* BUTTON */
.btn-update{
    margin-top:25px;
    padding:12px;
    width:100%;
    background:linear-gradient(135deg,#2563eb,#1e40af);
    border:none;
    color:white;
    font-weight:500;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.btn-update:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

/* RESPONSIVE */
@media(max-width:768px){
    .form-grid{
        grid-template-columns:1fr;
    }

    .full-width{
        grid-column:1;
    }
}

</style>


<h2 class="page-title">Edit Project</h2>

<div class="form-card">

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="form-grid">

<!-- TITLE -->
<div class="form-group">
<label>Project Title</label>
<input type="text" name="title" value="{{ project.title }}" required>
</div>

<!-- CATEGORY -->
<div class="form-group">
<label>Category</label>
<input type="text" name="category" value="{{ project.category }}" required>
</div>

<!-- PRICE -->
<div class="form-group">
<label>Price (₹)</label>
<input type="number" name="price" value="{{ project.price }}" required>
</div>

<!-- IMAGE -->
<div class="form-group">
<label>Project Image</label>
<input type="file" name="image">

{% if project.project_image %}
<div class="preview">
    <img src="{{ project.project_image.url }}">
</div>
{% endif %}
</div>

<!-- FILE -->
<div class="form-group">
<label>Project File / Video</label>
<input type="file" name="file">
</div>

<!-- DESCRIPTION -->
<div class="form-group full-width">
<label>Description</label>
<textarea name="description">{{ project.description }}</textarea>
</div>

</div>

<button type="submit" class="btn-update">Update Project</button>

</form>

</div>

{% endblock %}
