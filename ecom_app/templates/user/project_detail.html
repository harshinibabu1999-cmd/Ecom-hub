{% extends 'user/user_base.html' %}

{% block content %}

<style>

/* PAGE CENTER */
.detail-container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:80vh;
}

/* CARD */
.detail-card{
    width:420px;
    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
    text-align:center;
    animation:fadeIn 0.5s ease;
}

/* IMAGE */
.project-image{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:12px;
}

/* TITLE */
.project-title{
    margin-top:18px;
    font-size:22px;
    font-weight:600;
    color:#222;
}

/* DESCRIPTION */
.project-desc{
    margin-top:10px;
    color:#666;
    font-size:14px;
    line-height:1.5;
}

/* INFO BOX */
.project-info{
    background:#f5f8fc;
    padding:15px;
    border-radius:10px;
    margin-top:20px;
    text-align:left;
}

.project-info p{
    margin:8px 0;
    font-size:14px;
}

/* PRICE */
.price{
    font-size:20px;
    font-weight:600;
    color:#0f4c81;
}

/* BUTTON GROUP */
.button-group{
    display:flex;
    gap:12px;
    margin-top:25px;
}

/* BUTTON */
.buy-btn{
    flex:1;
    padding:11px;
    text-align:center;
    text-decoration:none;

    background:linear-gradient(135deg,#0f4c81,#1e88e5);
    color:white;

    border-radius:10px;
    font-weight:500;
    font-size:14px;

    transition:0.3s;
}

.buy-btn:hover{
    background:linear-gradient(135deg,#0a2a43,#0f4c81);
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

</style>

<div class="detail-container">

    <div class="detail-card">

        <img src="{{ project.project_image.url }}" class="project-image">

        <div class="project-title">{{ project.title }}</div>

        <p class="project-desc">{{ project.description }}</p>

        <div class="project-info">
            <p><b>Category:</b> {{ project.category }}</p>
            <p class="price">Price: ₹{{ project.price }}</p>
        </div>

        <div class="button-group">

            <a href="{% url 'view_output_video' project.id %}" class="buy-btn">
                🎬 Output Video
            </a>

            <a href="{% url 'initiate_payment' project.id %}" class="buy-btn">
                💳 Buy Now
            </a>

        </div>

    </div>

</div>

{% endblock %}
