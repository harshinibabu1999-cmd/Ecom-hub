<!DOCTYPE html>
<html>
<head>
    <title>{{ project.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f5f9ff;">

<div class="container mt-5">

    <div class="card shadow rounded-4 p-4">
        <div class="row">
            <div class="col-md-6">
                <img src="{{ project.image.url }}" class="img-fluid rounded-4">
            </div>

            <div class="col-md-6">
                <h2 class="text-primary">{{ project.title }}</h2>
                <h4 class="text-success">₹ {{ project.price }}</h4>

                <p class="mt-3">{{ project.full_description }}</p>

                <a href="{% url 'initiate_payment' project.id %}" 
   style="background:#0d6efd; color:white; padding:10px 20px; border-radius:8px; text-decoration:none;">
   Buy Now
</a>
            </div>
        </div>
    </div>

</div>
</body>
</html>
