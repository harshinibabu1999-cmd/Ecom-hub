{% extends 'user/user_base.html' %}
{% block content %}

<style>

/* PAGE */
.page-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:90vh;
    padding:20px;
    font-family:'Segoe UI',sans-serif;
}

/* CARD */
.register-container{
    width:700px;
    background:white;
    padding:40px;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
    animation:fadeIn 0.5s ease;
}

/* TITLE */
.register-title{
    text-align:center;
    margin-bottom:30px;
    font-size:26px;
    font-weight:600;
    color:#222;
}

/* GRID FORM */
.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group.full{
    grid-column:span 2;
}

/* LABEL */
label{
    font-size:13px;
    margin-bottom:5px;
    font-weight:600;
    color:#444;
}

/* INPUT */
.form-control{
    padding:11px 12px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:14px;
    transition:0.3s;
}

.form-control:focus{
    border-color:#1e88e5;
    outline:none;
    box-shadow:0 0 0 2px rgba(30,136,229,0.1);
}

textarea.form-control{
    resize:none;
    height:90px;
}

/* BUTTON */
.submit-btn{
    width:100%;
    background:linear-gradient(135deg,#0f4c81,#1e88e5);
    color:white;
    padding:13px;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:500;
    cursor:pointer;
    transition:0.3s;
}

.submit-btn:hover{
    background:linear-gradient(135deg,#0a2a43,#0f4c81);
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* RESPONSIVE */
@media(max-width:700px){
    .form-grid{
        grid-template-columns:1fr;
    }

    .form-group.full{
        grid-column:span 1;
    }
}

</style>

<div class="page-wrapper">

<div class="register-container">

<div class="register-title">
🎓 Student Registration
</div>

<form method="POST">
{% csrf_token %}

<div class="form-grid">

<div class="form-group">
<label>Username</label>
<input type="text" name="username" class="form-control" placeholder="Enter username" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" class="form-control" placeholder="Enter email" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" class="form-control" placeholder="Enter password" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="text" name="phone_number" class="form-control" placeholder="Enter phone number" required>
</div>

<div class="form-group">
<label>College Name</label>
<input type="text" name="college_name" class="form-control" placeholder="Enter college name" required>
</div>

<div class="form-group">
<label>Year of Study</label>
<input type="text" name="year_of_study" class="form-control" placeholder="e.g. 3rd Year" required>
</div>

<div class="form-group">
<label>Department</label>
<input type="text" name="department" class="form-control" placeholder="e.g. CSE" required>
</div>

<div class="form-group full">
<label>Address</label>
<textarea name="address" class="form-control" placeholder="Enter your address" required></textarea>
</div>

<div class="form-group full">
<button type="submit" class="submit-btn">
Create Account →
</button>
</div>

</div>

</form>

</div>

</div>

{% endblock %}
