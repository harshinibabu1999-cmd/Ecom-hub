{% extends "user/user_base.html" %}

{% block content %}

<style>

.video-container{
display:flex;
justify-content:center;
padding:30px 20px;
}

.video-card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
text-align:center;
max-width:700px;
width:100%;
}

.title{
font-size:22px;
margin-bottom:20px;
}

/* VIDEO */

.video-wrapper{
width:100%;
}

.video-wrapper video{
width:100%;
height:auto;
border-radius:10px;
}

.no-video{
color:#666;
font-size:15px;
}

</style>

<div class="video-container">

<div class="video-card">

<h2 class="title">{{ project.title }} - Output Video</h2>

{% if project.video %}

<div class="video-wrapper">

<video controls>
<source src="{{ project.video.url }}">
</video>

</div>

{% else %}

<p class="no-video">No output video uploaded yet.</p>

{% endif %}

</div>

</div>

{% endblock %}
