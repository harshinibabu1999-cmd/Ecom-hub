{% extends 'user/user_base.html' %}
{% block content %}

<style>

/* PAGE CENTER */
.success-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:80vh;
}

/* CARD */
.success-card{
    background:white;
    padding:35px;
    width:420px;
    border-radius:18px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
    animation:fadeIn 0.5s ease;
}

/* ICON */
.success-icon{
    font-size:60px;
    color:#28a745;
    margin-bottom:10px;
}

/* TITLE */
.success-card h2{
    margin:10px 0;
    font-size:22px;
    color:#222;
}

/* TEXT */
.success-card p{
    color:#666;
    font-size:14px;
}

/* DETAILS BOX */
.details{
    background:#f5f8fc;
    padding:15px;
    border-radius:10px;
    margin-top:18px;
    text-align:left;
}

.details p{
    margin:6px 0;
    font-size:14px;
}

/* BUTTON */
.home-btn{
    display:inline-block;
    margin-top:22px;
    padding:10px 22px;

    background:linear-gradient(135deg,#0f4c81,#1e88e5);
    color:white;
    text-decoration:none;

    border-radius:10px;
    font-size:14px;
    font-weight:500;

    transition:0.3s;
}

.home-btn:hover{
    background:linear-gradient(135deg,#0a2a43,#0f4c81);
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

</style>

<div class="success-wrapper">

<div class="success-card">

<div class="success-icon">✔</div>

<h2>Payment Successful 🎉</h2>

<p>Your payment has been completed successfully.</p>

<div class="details">
    <p><b>Project:</b> {{ payment.project.title }}</p>
    <p><b>Amount Paid:</b> ₹{{ payment.amount }}</p>
</div>

<a href="{% url 'user_home' %}" class="home-btn">
Back to Projects
</a>

</div>

</div>

{% endblock %}
