{% extends "user/User_base.html" %}
{% block content %}

<style>

.payment-container{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top:40px;
}

.payment-card{
    width:450px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(0,0,0,0.1);
    font-family:'Segoe UI',sans-serif;
}

.payment-card h2{
    text-align:center;
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    font-weight:600;
    display:block;
    margin-bottom:5px;
}

.form-control{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

textarea.form-control{
    resize:none;
}

.payment-methods{
    margin-top:15px;
}

.method{
    background:#f5f7fb;
    padding:10px;
    border-radius:6px;
    margin-bottom:8px;
}

.pay-btn{
    width:100%;
    background:#0d192a;
    color:white;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    margin-top:15px;
}

.pay-btn:hover{
    background:#0c1d3c;
}

</style>

<div class="payment-container">

<div class="payment-card">

<h2>💳 Payment Form</h2>

<form method="POST">
{% csrf_token %}

<div class="form-group">
<label>Name</label>
<input type="text" name="name" class="form-control" required>
</div>

<div class="form-group">
<label>Phone</label>
<input type="text" name="phone" class="form-control" required>
</div>

<div class="form-group">
<label>Address</label>
<textarea name="address" class="form-control" rows="3" required></textarea>
</div>

<h3>Select Payment Method</h3>

<div class="payment-methods">

<div class="method">
<input type="radio" name="payment_method" value="UPI" required> UPI
</div>

<div class="method">
<input type="radio" name="payment_method" value="CARD"> Debit / Credit Card
</div>

<div class="method">
<input type="radio" name="payment_method" value="COD"> Cash on Delivery
</div>

</div>

<button type="submit" class="pay-btn">Proceed to Pay</button>

</form>

</div>

</div>

{% endblock %}
