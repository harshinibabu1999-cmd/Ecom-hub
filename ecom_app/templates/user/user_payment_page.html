{% extends 'user/user_base.html' %}

{% block content %}

<style>

.payment-wrapper{
display:flex;
justify-content:center;
margin-top:60px;
font-family:'Segoe UI',sans-serif;
}

.payment-card{
width:450px;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.payment-title{
text-align:center;
margin-bottom:25px;
font-size:24px;
font-weight:600;
color:#0d6efd;
}

.payment-info{
background:#f5f7fb;
padding:15px;
border-radius:8px;
margin-bottom:15px;
}

.payment-info p{
margin:8px 0;
font-size:15px;
}

.status{
color:#ff9800;
font-weight:bold;
}

.amount{
font-size:18px;
font-weight:bold;
color:#198754;
}

.pay-btn{
display:block;
width:100%;
text-align:center;
padding:12px;
background:#0d6efd;
color:white;
text-decoration:none;
border-radius:8px;
font-size:16px;
font-weight:500;
margin-top:20px;
}

.pay-btn:hover{
background:#0b5ed7;
}

</style>

<div class="payment-wrapper">

<div class="payment-card">

<div class="payment-title">
💳 Payment Summary
</div>

<div class="payment-info">
<p><b>Project:</b> {{ payment.project.title }}</p>
<p class="amount"><b>Amount:</b> ₹{{ payment.amount }}</p>
<p class="status"><b>Status:</b> {{ payment.status }}</p>
<p><b>Transaction ID:</b> {{ payment.transaction_id }}</p>
</div>

<a href="{% url 'payment_form' payment.id %}" class="pay-btn">
Proceed to Payment →
</a>

</div>

</div>

{% endblock %}
